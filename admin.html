
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ReNova Studio Admin</title>

<style>
body{
background:#111;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
color:#fff;
}

.box{
background:#222;
padding:30px;
border-radius:12px;
width:350px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#d7aa42;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

#admin{
display:none;
}
</style>
</head>

<body>

<div class="box" id="login">

<h2>Admin Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<div class="box" id="admin">

<h2>ReNova Studio</h2>

<input id="title" placeholder="Title">

<textarea id="text" rows="6" placeholder="Description"></textarea>

<button onclick="saveContent()">Save Content</button>

<button onclick="logout()">Logout</button>

<p id="saved"></p>

</div>
