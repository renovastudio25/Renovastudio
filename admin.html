<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReNova Studio Admin</title>
<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#222;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}
button{
width:100%;
padding:12px;
background:#d7aa42;
border:none;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>ReNova Studio Admin</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
